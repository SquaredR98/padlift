services:
  postgres:
    image: postgres:16-alpine
    container_name: launchpad-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: launchpad
      POSTGRES_PASSWORD: launchpad
      POSTGRES_DB: launchpad
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
